name: Build

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Compile Calculator
        run: javac calculator/Calculator.java

      - name: Compile To-Do List
        run: javac todo-list/TodoApp.java

      - name: Compile Bank Account
        run: javac bank-account/BankAccount.java

      - name: Compile Expense Tracker
        run: javac expense-tracker/ExpenseTracker.java

      - name: Compile Snake Game
        run: javac snake-game/SnakeGame.java snake-game/GamePanel.java

      - name: Compile Study Planner
        run: javac study-planner/*.java
